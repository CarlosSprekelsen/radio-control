# Build arm32 binary and generate an LXE/LXC container image for RCC

name: Build RCC LXE Image (arm32)

on:
  workflow_dispatch:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  arm32-build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Build arm32 binary using QEMU emulation
      uses: uraimo/run-on-arch-action@v2.8.1
      with:
        arch: armv7
        distro: ubuntu22.04
        githubToken: ${{ github.token }}
        dockerRunArgs: |
          --volume "${{ github.workspace }}:/workspace"
        install: |
          apt-get update
          apt-get install -y build-essential cmake git pkg-config file \
            libssl-dev libyaml-cpp-dev nlohmann-json3-dev libfmt-dev libasio-dev
        run: |
          cd /workspace/rcc
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DRCC_BUILD_TESTS=OFF
          cmake --build build --parallel
          file build/src/radio-control-container || file build/radio-control-container

    - name: Verify arm32 binary
      run: |
        BINARY=$(find ./rcc/build -type f -name radio-control-container | head -1)
        if [ -z "$BINARY" ]; then
          echo "ERROR: radio-control-container binary not found"
          exit 1
        fi
        echo "Binary metadata:"
        file "$BINARY"
        readelf -h "$BINARY" | grep Machine || true
        sudo apt-get update
        sudo apt-get install -y qemu-user-static || echo "QEMU install skipped"
        qemu-arm-static "$BINARY" ./rcc/config/default.yaml || echo "Binary executed under qemu"

    - name: Verify config assets
      run: |
        test -f ./rcc/config/default.yaml

    - name: Build arm32 LXC container
      continue-on-error: true
      run: |
        sudo apt-get install -y lxc lxc-templates || {
          echo "WARNING: LXC installation failed; skipping container creation"
          exit 0
        }
        sudo mkdir -p /var/lib/lxc
        sudo ./deploy/lxc/setup.sh

    - name: Package container artifacts
      run: |
        mkdir -p artifacts
        if sudo test -d /var/lib/lxc/rcc; then
          sudo tar -C /var/lib/lxc -czf artifacts/rcc-arm32-lxc.tar.gz rcc
        else
          echo "No container rootfs found; creating placeholder artifact"
          echo "Container creation skipped on runner" > artifacts/README.txt
        fi

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: rcc-arm32-lxc
        path: artifacts
        retention-days: 14
        if-no-files-found: warn

    - name: Clean workspace
      if: always()
      run: |
        rm -rf ./rcc/build
