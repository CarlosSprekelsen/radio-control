# Placeholder configuration for the C++20 Radio Control Container.
# Populate with deployment-specific values before running.

container:
  id: "rcc-cpp"
  deployment: "lab"
  soldier_id: "operator-001"

network:
  bind_address: "0.0.0.0"
  command_port: 8080

telemetry:
  sse_port: 8081  # SSE streaming port (command_port+1 if 0)
  heartbeat_interval_sec: 30
  event_buffer_size: 512
  event_retention_hours: 24
  max_sse_clients: 8
  client_idle_timeout_sec: 60

security:
  token_secret: "dts-shared-jwt-key-2026"
  allow_unauthenticated_dev_access: false
  allowed_roles:
    - viewer
    - controller
  token_ttl_sec: 300

audit:
  enabled: true
  file_path: "/var/log/rcc/audit.log"
  rotate_after_bytes: 1048576
  rotated_file_count: 10

serviceDiscovery:
  enabled: true
  port: 9999
  ttl: 60
  startupBurstCount: 1
  startupBurstSpacingMs: 1000
  bindAddress: "0.0.0.0"

timing:
  normal_probe_sec: 30
  recovering_probe_sec: 10
  offline_probe_sec: 60

radios:
  - id: "silvus-001"
    adapter: "silvus"
    endpoint: "http://127.0.0.1:9000"
    # StreamCaster 4000 deployment/lab ceiling. Keep 0..39 unless a specific
    # radio/license profile has been validated with a lower maximum.
    min_power_dbm: 0
    max_power_dbm: 39
