# Production-shape RCC configuration.
# Override the Silvus endpoint and JWT secret per deployment before use.

container:
  id: "rcc-production"
  deployment: "production"
  soldier_id: "operator-001"

network:
  bind_address: "0.0.0.0"
  command_port: 8080

telemetry:
  sse_port: 8081
  heartbeat_interval_sec: 30
  event_buffer_size: 512
  event_retention_hours: 24
  max_sse_clients: 8
  client_idle_timeout_sec: 60

security:
  token_secret: "CHANGE_ME_min_16_bytes_for_live_integration"
  allow_unauthenticated_dev_access: false
  allowed_roles:
    - viewer
    - controller
  token_ttl_sec: 300

audit:
  enabled: true
  file_path: "/var/log/rcc/audit.log"
  rotate_after_bytes: 1048576
  rotated_file_count: 10

serviceDiscovery:
  enabled: true
  port: 9999
  ttl: 60
  startupBurstCount: 1
  startupBurstSpacingMs: 1000
  bindAddress: "0.0.0.0"

timing:
  normal_probe_sec: 30
  recovering_probe_sec: 10
  offline_probe_sec: 60

radios:
  - id: "silvus-001"
    adapter: "silvus"
    endpoint: "http://172.20.0.2/streamscape_api"
    min_power_dbm: 0
    max_power_dbm: 39
