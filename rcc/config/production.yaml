server:
  host: 0.0.0.0
  port: 8080
  tls: false

radio:
  default_baud: 115200
  poll_interval_ms: 1000

telemetry:
  buffer_size: 100
  max_clients: 10

logging:
  level: info
  output: stdout

audit:
  enabled: true
  file_path: "/var/log/rcc/audit.log"
  rotate_after_bytes: 1048576
  rotated_file_count: 10
